<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0ea5e9">
    <title>FarmaPocket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💊</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 50%, #0369a1 100%); }
        .glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .pulse-ring { animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.8; }
            50% { transform: scale(1); opacity: 0.4; }
            100% { transform: scale(0.8); opacity: 0.8; }
        }
        .slide-up { animation: slideUp 0.6s ease-out; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .google-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .google-btn:active { transform: translateY(0); }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <!-- Logo Section -->
        <div class="text-center mb-8 slide-up">
            <div class="relative inline-block mb-4">
                <div class="pulse-ring absolute inset-0 rounded-full bg-white/20"></div>
                <div class="relative w-24 h-24 mx-auto bg-white rounded-full flex items-center justify-center shadow-2xl">
                    <span class="text-5xl">💊</span>
                </div>
            </div>
            <h1 class="text-4xl font-bold text-white mb-2" data-i18n="app.name">FarmaPocket</h1>
            <p class="text-blue-100 text-lg" data-i18n="app.tagline">Seu Gerenciador Pessoal de Medicamentos</p>
        </div>

        <!-- Login Card -->
        <div class="glass rounded-2xl p-8 shadow-2xl slide-up" style="animation-delay: 0.2s">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-semibold text-white mb-2" data-i18n="auth.welcome">Bem-vindo ao FarmaPocket</h2>
                <p class="text-blue-100 text-sm" data-i18n="auth.subtitle">Gerencie seus medicamentos com segurança e simplicidade</p>
            </div>

            <!-- Google Login Button -->
            <button id="google-login" class="google-btn w-full bg-white text-gray-700 font-medium py-4 px-6 rounded-xl flex items-center justify-center gap-3 transition-all duration-300 shadow-lg">
                <svg class="w-6 h-6" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span data-i18n="auth.loginWithGoogle">Entrar com Google</span>
            </button>

            <!-- Loading State -->
            <div id="loading" class="hidden mt-4 text-center">
                <div class="inline-block w-6 h-6 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                <p class="text-blue-100 text-sm mt-2" data-i18n="common.loading">Carregando...</p>
            </div>

            <!-- Error Message -->
            <div id="error-msg" class="hidden mt-4 p-3 bg-red-500/20 border border-red-400/30 rounded-lg text-red-100 text-sm text-center"></div>

            <!-- Offline Warning -->
            <div id="offline-warning" class="hidden mt-4 p-3 bg-yellow-500/20 border border-yellow-400/30 rounded-lg text-yellow-100 text-sm text-center">
                ⚠️ <span data-i18n="common.offline">Você está offline. Verifique sua conexão.</span>
            </div>
        </div>

        <!-- Language Selector -->
        <div class="mt-6 text-center slide-up" style="animation-delay: 0.4s">
            <select id="lang-selector" class="bg-white/10 text-white border border-white/20 rounded-lg px-4 py-2 text-sm backdrop-blur-sm focus:outline-none focus:ring-2 focus:ring-white/50">
                <option value="pt-BR" class="text-gray-800">Português (BR)</option>
                <option value="en" class="text-gray-800">English</option>
                <option value="es" class="text-gray-800">Español</option>
            </select>
        </div>

        <!-- Footer -->
        <p class="text-center text-blue-200/60 text-xs mt-6">
            FarmaPocket v1.0 • Seus dados estão protegidos
        </p>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Language selector
        document.getElementById('lang-selector').addEventListener('change', (e) => {
            i18n.setLanguage(e.target.value);
        });

        // Check if already logged in
        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'app.html';
            }
        });

        // Offline detection
        window.addEventListener('offline', () => {
            document.getElementById('offline-warning').classList.remove('hidden');
        });
        window.addEventListener('online', () => {
            document.getElementById('offline-warning').classList.add('hidden');
        });
    </script>
</body>
</html>
